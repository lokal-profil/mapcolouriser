name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Enable corepack (provides pnpm pinned in package.json)
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # The four checks below run independently — `if: always()` ensures all
      # results surface even when an earlier one fails.

      - name: ruff format --check
        if: always()
        run: uv run ruff format --check

      - name: ruff check
        if: always()
        run: uv run ruff check

      - name: pytest
        if: always()
        run: uv run pytest

      - name: vitest
        if: always()
        run: pnpm test

      - name: SVG marker check
        if: always()
        run: uv run python scripts/check_svg.py
