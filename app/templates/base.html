<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>{% block title %}Map Colouriser{% endblock %}</title>
    <script>
        // Set classes before body renders to avoid flashing the no-JS layout
        // before main.js loads (FOUC prevention).
        document.documentElement.classList.add("js-enabled", "live-preview");
    </script>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
        h1 { margin-top: 0; }
        .group { border: 1px solid #ccc; border-radius: 4px; padding: 1rem; margin-bottom: 1rem; }
        .group-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
        .group-row label { display: flex; flex-direction: column; flex: 1; min-width: 12rem; }
        select[multiple] { min-height: 8rem; width: 100%; }
        .errors { background: #fdd; border: 1px solid #c00; padding: 0.75rem 1rem; border-radius: 4px; }
        .errors ul { margin: 0.25rem 0 0 1rem; padding: 0; }
        button { cursor: pointer; padding: 0.4rem 0.8rem; }
        .actions { display: flex; gap: 0.5rem; margin-top: 1rem; align-items: center; flex-wrap: wrap; }
        .preview { border: 1px solid #ccc; padding: 0.5rem; margin-top: 1rem; }
        .preview svg { display: block; width: 100%; height: auto; max-height: 80vh; max-width: 100%; }
        .live-preview-toggle { display: inline-flex; gap: 0.3rem; align-items: center; margin-left: auto; cursor: pointer; }
        /* Visually replaced by .switch, but the input itself stays a 1×1 hit
           area (not zero-size) so screen readers, automation tools, and
           visibility heuristics still treat it as a real, reachable control. */
        .live-preview-toggle input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            width: 1px;
            height: 1px;
            margin: 0;
        }
        .live-preview-toggle .switch {
            display: inline-block;
            width: 2.2rem;
            height: 1.2rem;
            background: #ccc;
            border-radius: 0.6rem;
            position: relative;
            transition: background 0.15s;
        }
        .live-preview-toggle .switch::after {
            content: "";
            position: absolute;
            top: 0.1rem;
            left: 0.1rem;
            width: 1rem;
            height: 1rem;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.15s;
        }
        /* Wikimedia Codex `background-color-progressive`. */
        .live-preview-toggle input[type="checkbox"]:checked ~ .switch { background: #36c; }
        .live-preview-toggle input[type="checkbox"]:checked ~ .switch::after { transform: translateX(1rem); }
        .live-preview-toggle input[type="checkbox"]:focus-visible ~ .switch {
            outline: 2px solid #66f;
            outline-offset: 2px;
        }

        /* Stack form and preview on narrow viewports; side-by-side at >=900px
           but only when live preview is active. Widen the body too so each
           column gets breathing room — single-column layouts keep the
           default 960px max-width. */
        .layout { display: flex; flex-direction: column; gap: 1rem; }
        .preview-pane .preview { margin-top: 0; }
        #legend-box { margin-top: 1rem; }
        #legend-output { width: 100%; box-sizing: border-box; font-family: ui-monospace, monospace; margin: 0.5rem 0; }
        @media (min-width: 900px) {
            html.live-preview body { max-width: 1280px; }
            html.live-preview .layout { display: grid; grid-template-columns: 1fr 2fr; align-items: start; }
            html.live-preview .preview-pane { position: sticky; top: 1rem; }
        }

        /* Progressive enhancement: hide JS-only affordances when JS is off,
           and swap between live-preview and fallback flows via a class on
           <html> (set above to avoid FOUC). */
        html:not(.js-enabled) .js-only { display: none; }
        html:not(.js-enabled) .preview-pane { display: none; }
        html:not(.live-preview) #map-preview,
        html:not(.live-preview) #legend-box,
        html:not(.live-preview) .js-live { display: none; }
        html.live-preview .js-fallback { display: none; }
    </style>
</head>
<body>
    <h1>Map Colouriser</h1>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
