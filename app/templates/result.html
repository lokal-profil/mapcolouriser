{% extends "base.html" %}
{% block content %}
    <p>
        <a href="{{ url_for('main.index') }}">&larr; Back to form</a>
    </p>
    <div class="actions">
        <a href="{{ url_for('main.download') }}">
            <button type="button">Download SVG</button>
        </a>
    </div>
    <div class="preview">
        {{ svg | safe }}
    </div>
    <details class="result-legend" open>
        <summary>Wikitext legend</summary>
        <textarea id="legend-output" readonly rows="{{ [legend.count('\n') + 1, 2] | max }}">{{ legend }}</textarea>
    </details>
{% endblock %}
